name: CI

# ==============================================================================
# Pwn-Request hardening (see SECURITY.md § Supply-chain & CI for rationale):
#   * Trigger is `pull_request`, NEVER `pull_request_target` — PR code runs in
#     a sandboxed commit with no secrets access and no write perms.
#   * All third-party actions pinned by full-length commit SHA, not tag —
#     tags are mutable; SHAs are not. Dependabot (.github/dependabot.yml)
#     auto-proposes pinned upgrades weekly.
#   * Workflow-level `permissions:` defaults to the minimum; every job
#     restates what it needs explicitly so new steps can't silently inherit.
#   * step-security/harden-runner monitors egress from the runner and will
#     fail the job if any step attempts unexpected network traffic.
#   * No `secrets.*` interpolated into `run:` blocks; no `GITHUB_TOKEN`
#     granted `write` here.
# ==============================================================================

on:
  push:
    branches: [main]
  pull_request:

permissions: {}   # deny-all at workflow scope; each job opts in to what it needs

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40   # v2.19.0
        with:
          egress-policy: audit   # start in audit; flip to `block` once we have a known-good allowlist
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd   # v6.0.2
        with:
          persist-credentials: false   # don't leave GITHUB_TOKEN on disk for later steps
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Lint all shell scripts
        run: |
          set -e
          # SC1091 = sourced file not followable by static analysis — expected
          # because lib/patterns.sh is resolved at runtime.
          shellcheck --severity=warning --exclude=SC1091 \
            bootstrap.sh \
            secure-claude/.claude/hooks/*.sh \
            secure-claude/.claude/hooks/lib/*.sh

  self-test:
    name: bootstrap.sh --verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40   # v2.19.0
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd   # v6.0.2
        with:
          persist-credentials: false
      - name: Install runtime deps (jq, perl, curl, sqlite3)
        run: |
          sudo apt-get update
          sudo apt-get install -y jq perl curl sqlite3
      - name: Install gitleaks
        run: |
          VERSION=8.18.4
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version
      - name: Run self-test
        run: ./bootstrap.sh --verify
      - name: Dry-run install matrix
        run: |
          mkdir -p /tmp/ci-local /tmp/ci-global-home
          ./bootstrap.sh --local /tmp/ci-local --force --dry-run
          HOME=/tmp/ci-global-home ./bootstrap.sh --global --force --dry-run
      - name: Real install smoke test
        run: |
          mkdir -p /tmp/ci-real
          ./bootstrap.sh --local /tmp/ci-real --force
          test -x /tmp/ci-real/.claude/hooks/secret-scan.sh
          test -f /tmp/ci-real/.claude/hooks/lib/patterns.sh
          test -f /tmp/ci-real/docs/threat-model.md.example
          test -f /tmp/ci-real/.mcp.json

  validate-configs:
    name: Validate JSON / YAML
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40   # v2.19.0
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd   # v6.0.2
        with:
          persist-credentials: false
      - name: Install jq + yq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          sudo curl -sSL -o /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
      - name: Validate all JSON
        run: |
          set -e
          for f in $(find . -name '*.json' -not -path './node_modules/*' -not -path './.git/*'); do
            echo "→ $f"
            jq empty "$f"
          done
      - name: Validate all YAML
        run: |
          set -e
          for f in $(find . -name '*.yml' -o -name '*.yaml' -not -path './.git/*'); do
            echo "→ $f"
            yq '.' "$f" > /dev/null
          done

  gitleaks:
    name: Self-scan (gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40   # v2.19.0
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd   # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install gitleaks
        run: |
          VERSION=8.18.4
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
      - name: Scan repo history
        run: |
          # The repo contains example secret *shapes* in self-test fixtures
          # (e.g. AKIAIOSFODNN7EXAMPLE from AWS docs) — not real secrets.
          # Allow them via a config-level allowlist.
          cat > .gitleaks.toml <<'TOML'
          [extend]
          useDefault = true

          [allowlist]
          description = "Self-test fixtures and example tokens from official docs"
          regexes = [
            "AKIAIOSFODNN7EXAMPLE",
            "github_pat_xxxxxxxx",
            "sk-abcdefghijklmnopqrstuvwxyz1234567890",
          ]
          paths = [
            '''secure-claude/.env.example''',
            '''secure-claude/.claude/hooks/lib/patterns.sh''',
            '''secure-claude/.claude/hooks/secret-scan.sh''',
            '''secure-claude/.claude/hooks/audit-log.sh''',
            '''bootstrap.sh''',
            '''.github/workflows/ci.yml''',
          ]
          TOML
          gitleaks detect --source . --no-banner --redact --config .gitleaks.toml
